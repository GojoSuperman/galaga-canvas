## GitHub Pages 배포.
##
## Pages의 기본 워크플로는 Jekyll을 강제로 돌리는데, 이 저장소의 docs/ 안 마크다운에는
## Jekyll이 템플릿 변수로 오해하는 문자열이 들어 있어 빌드가 실패한다.
## 이 게임은 빌드가 필요 없는 정적 파일 묶음이므로, Jekyll을 거치지 않고 그대로 업로드한다.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 배포는 한 번에 하나만. 진행 중인 것을 취소하지는 않는다(중간에 끊긴 배포를 남기지 않기 위해).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 의존성이 0개라 설치할 것이 없다. 테스트만 돌려 깨진 코드를 배포하지 않는다.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 테스트
        run: npm test

      - uses: actions/configure-pages@v5

      - name: 정적 파일 업로드 (저장소 루트를 그대로)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: 배포
        id: deployment
        uses: actions/deploy-pages@v4
